[metadata]
name = "tmux-sessions"
description = "List and manage tmux sessions"
requirements = ["tmux"]

[source]
command = """
tmux list-sessions -F '#{session_last_attached}\t#{session_name}\t#{session_windows} windows\t#{session_created_string}' \
  | sort --numeric-sort --reverse \
  | cut --delimiter '\t' --fields 2- \
  | grep --invert-match --extended-regexp "^($(tmux display-message -p '#S' 2>/dev/null)|popup)\t"
"""
no_sort = true
frecency = false
display = "{split:\t:0} ({split:\t:1})"
output = "{split:\t:0}"

[keybindings]
enter = "actions:switch"

[preview]
command = "tmux capture-pane -t '{split:\t:0}' -p 2>/dev/null || echo 'No preview available'"

[actions.attach]
description = "Attach to the selected session"
command = "tmux attach-session -t '{split:\t:0}'"
mode = "execute"

[actions.switch]
description = "Switch to the selected session"
command = "tmux switch-client -t '{split:\t:0}'"
mode = "execute"

[actions.kill]
description = "Kill the selected session"
command = "tmux kill-session -t '{split:\t:0}'"
mode = "fork"
